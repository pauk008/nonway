<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Shaxsiy Kabinet</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #f8f9fa; font-family: 'Poppins', sans-serif; }
        .cabinet-card { background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); padding: 3px; }
    </style>
</head>
<body>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-10">
            <div class="card cabinet-card p-4">
                <div class="d-flex justify-content-between align-items-center border-bottom pb-3 mb-4">
                    <h2>👤 Shaxsiy Kabinet</h2>
                    <div>
                        <span class="badge bg-secondary p-2 fs-6">+{{ request.user.username }}</span>
                        <a href="/" class="btn btn-outline-primary btn-sm ms-2">Bosh sahifa</a>
                    </div>
                </div>

                <h4 class="mb-3 text-muted">Sizning buyurtmalaringiz tarixi</h4>

                <div class="table-responsive">
                    <table class="table table-hover align-middle">
                        <thead class="table-light">
                            <tr>
                                <th>Buyurtma ID</th>
                                <th>Yetkazish manzili</th>
                                <th>To'lov turi</th>
                                <th>Holati</th>
                            </tr>
                        </thead>
                        <tbody>
                            {% for order in my_orders %}
                            <tr>
                                <td><strong>#{{ order.id }}</strong></td>
                                <td>{{ order.address }}</td>
                                <td>Naqd</td>
                                <td><span class="badge bg-success">Qabul qilindi</span></td>
                            </tr>
                            {% empty %}
                            <tr>
                                <td colspan="4" class="text-center text-muted py-4">
                                    Sizda hali xaridlar mavjud emas uka.
                                </td>
                            </tr>
                            {% endfor %}
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
